<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сat clicker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./images/cat-icons.svg" type="image/x-icon">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="header_title">Кликер кошечек</h1>
        </div>
    </header>

    <main class="main">
        <section class="welcome">
            <div class="container">
                <img src="./images/main-cat.jpeg" alt="" class="main-img" id="IMG">
                <div class="welcome-text">
                    <h2 class="welcome-click">Нажато:</h2>
                    <h2 class="welcome-count"><span id="count">0</span> раз</h2>
                </div>
            </div>
        </section>

        <section class="shop">
            <div class="container">
                <h3 class="shop-title">Магазин</h3>
                <div class="shop-list">
                    <div class="buff" id="buffId">
                        <p class="buff-item">2x</p>
                        <p class="buff-desc">В 2 раза больше кликов</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
